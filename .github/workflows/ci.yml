name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: atelier_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d atelier_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/atelier_test?sslmode=disable
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-placeholder-auth-secret
      MOBILE_JWT_SECRET: ci-placeholder-mobile-jwt
      RESEND_API_KEY: re_ci_placeholder
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run Prisma migrations
        run: pnpm --filter @atelier/db exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      # TODO: add lint step once eslint config decided

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
